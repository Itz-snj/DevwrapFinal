services:
  # ─── Backend API + WebSocket ───────────────────────────────
  - type: web
    name: phoenix-api
    runtime: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false  # Set manually after frontend is deployed

  # ─── Frontend (TanStack Start SSR) ────────────────────────
  - type: web
    name: phoenix-frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_BASE
        sync: false  # Set to your backend Render URL, e.g. https://phoenix-api.onrender.com
      - key: PORT
        value: "3000"
